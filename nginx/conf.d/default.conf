# ── Rate-limiting zone (http context — must be outside server{}) ──────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ─────────────────────────────────────────────────────────────────────────────
# SERVER BLOCK 1 — HTTP (port 80)
# Serves ACME challenge; 301-redirects everything else to HTTPS.
# ${DOMAIN} is substituted by certbot-bootstrap.sh via `envsubst '${DOMAIN}'`
# before this file is loaded.  Do NOT hardcode a domain here.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name ${DOMAIN};

    # Let's Encrypt ACME challenge (certbot webroot validation)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Permanent redirect — all other HTTP traffic goes to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# SERVER BLOCK 2 — HTTPS (port 443)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ${DOMAIN};

    # ── TLS ───────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/html text/css application/javascript application/json;

    # ── Anthropic SSE streaming (no buffering, extended read timeout) ──────────
    # More specific prefix wins over /api/ below.
    location /api/chat/stream {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        limit_req zone=api_limit burst=20 nodelay;
    }

    # ── FastAPI backend ────────────────────────────────────────────────────────
    # No trailing slash: preserves the /api/ prefix so backend routes resolve.
    location /api/ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=api_limit burst=20 nodelay;
    }

    # ── React SPA ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass       http://frontend:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
