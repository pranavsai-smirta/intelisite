# ─────────────────────────────────────────────────────────────────────────────
# BOOTSTRAP CONFIG — HTTP only
#
# Used ONLY during the first-time certbot certificate issuance, before any
# TLS certificates exist.  certbot-bootstrap.sh swaps this in automatically.
#
# Do NOT use this in production — it has no HTTPS and no redirect.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Serve ACME challenge files for Let's Encrypt webroot validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Placeholder — returns 200 so nginx starts cleanly before certs exist
    location / {
        return 200 "Awaiting SSL certificate provisioning.\n";
        add_header Content-Type text/plain;
    }
}
